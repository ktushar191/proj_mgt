<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

  <body>
   
    
   

  <!-- Large modal -->
<button type="button" class="btn btn-primary" data-toggle="modal" data-target=".bd-example-modal-lg">Large modal</button>

<div class="modal fade bd-example-modal-lg" tabindex="-1" role="dialog" aria-labelledby="myLargeModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
        <section class="container">
            <header><b>ADD PROJECT</b></header>
            <form action="#" class="form">
                
                    <div class="input-box" >
                        <label for="txt1">Title:</label>
                        <input type="text"  id="txt1" >
                    </div>
                  
                    
                 
                  <div class="input-box">
                    <label for="txt2">Technology:</label>
                   
                        <input type="text"  id="txt2" >
                  </div>
              
                <div class="input-box">
                    <label for="txt3">Academic Year:</label>
                    <input type="text"  id="txt3" >
                    <script src="Addproj.js"></script>
                  </div>
                  
                <div class="input-box">
                    <label for="text4">Description:</label>
                    <textarea name="description" id="text4"class="form-control custom-textarea" rows="5"></textarea>
                  </div>
                  <div class="text-center">
                    <button class="Submitbtn " >Submit</button>
                  </div>
                  
                
        </form>
        </section>
    </div>
  </div>
</div>

<!-- Small modal -->
<button type="button" class="btn btn-primary" data-toggle="modal" data-target=".bd-example-modal-sm">Small modal</button>

<div class="modal fade bd-example-modal-sm" tabindex="-1" role="dialog" aria-labelledby="mySmallModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
       
    </div>
  </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
