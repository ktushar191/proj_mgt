<!DOCTYPE html>
<html lang="en">
<head>

                <label>Project Allocation Form:</label>
              </div>

                  <option hidden>Select Year</option>
                  <option>2021-2022</option>
                  <option>2022-2023</option>
                  <option>2023-2024</option>
                </select>
              </div><br>
              <div class="input-box">
                <label>Select Project:</label>
              </div>
              <div class="select-box">
            
                <select id="project">
                  <option hidden>Select Project</option>
                  <option>SDC Project Management</option>
                  <option>MCQ Exams</option>
                  <option>Feedback Analysis</option>
                  <option>IIMS Result Analysis</option>
                  <option>IIMS Fees</option>
                </select>
            </div><br>
            <div class="input-box">
                 <label>Select Student:</label>
              </div>
              <div class="select-box">
            
                <select id="student">
                  <option hidden>Select Student</option>
                  <option></option>
                  <option></option>
                  <option></option>
                  <option></option>
                  <option></option>
                </select>
            </div><br>
              <button>Allocate</button>
        </form>
</body>
</html>
