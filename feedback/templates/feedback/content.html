{% block content%} 


<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-10 col-md-10 col-lg-6 col-xl-5 text-center p-0 mt-3 mb-2">
            <div class="card px-0 pt-4 pb-0 mt-3 mb-3">
                <h2 id="heading">UPLOAD FILES</h2>
                <!-- <p>Fill all form field to go to next step</p> -->
                <form onsubmit="return form_submit(event);" name="upload" id="upload" action="." method="post" enctype="application/x-www-form-urlencoded">
                    {% csrf_token %}
                   
                    <fieldset id="step1" >
                        <div class="form-card">
                            <div class="row">
                                
                            </div> 
                            
                            
                            <select class="select1" id="course" name="course" onchange="$('#overlay').show();" >
                                <option value='' > Select Course: *</option>
                                {% for item in course_data%}
                                <option value="{{item.id}}">"{{item.course_name}}"</option>
                                {% endfor %}
                           </select> <br><br>

                            <select class="select1" id="academic_year" name="academic_year" onchange="$('#overlay').show();" style="width:45%;" >
                                <option value='' > Select Acadamic Year: *</option>
                                {% for item in ay_data%}
                                <option value="{{item.id}}">"{{item.ayear}}"</option>
                                {% endfor %}
                           </select> 

                           <select class="select2" id="Semester" name="Semester" onchange="$('#overlay').show();" style="width:45%;"  >
                            <option value='' > Select Semester: *</option>
                            {% for item in semester_data%}
                            <option value="{{item.id}}">"{{item.semester_name}}"</option>
                            {% endfor %}
                       </select> <br><br>

                       <select class="select1" id="subject" name="subject" onchange="$('#overlay').show();" >
                        <option value='' > Select Subject: *</option>
                        {% for item in subject_data%}
                        <option value="{{item.id}}">"{{item.short_name}}"</option>
                        {% endfor %}
                   </select> <br><br>

                   <select class="select1" id="subject" name="subject" onchange="$('#overlay').show();" >
                        <option value='' > Select Subject: *</option>
                        {% for item in subject_data%}
                        <option value="{{item.id}}">"{{item.short_name}}"</option>
                        {% endfor %}
                   </select> <br><br>

                
                       <label  for="chapter">Chapter: *</label>
                       <input type="text" class="cls1" id="chapter" name="chapter" placeholder="Chapter" onkeyup="is_Valid(this);"><br>
                       <label for="topic">Topic: *</label>
                       <input type="text" class="topic" id="topic" name="topic" placeholder="Topic" onkeyup="is_Valid(this);"><br>
                       <label for="res">Select File:</label>
                       <input id="res" type="file" name="content" placeholder="File" onkeyup="is_Valid(this);"><br>
                       <label for="link">Link: *</label>
                       <input type="text" class="input_info" id="link" name="link" placeholder="Link" onkeyup="is_Valid(this);"><br>

                       <input type="text" class="cls1" id="chapter" name="chapter" placeholder="Chapter" onkeyup="is_Valid(this);"><br>

                   
                        </div> 
                            <input type="submit" name="save" id="save" class=" action-button" value="Save" onclick="form_submit();" />
                    </fieldset>
                 
                </form>
            </div>

</div>

{% endblock%}

<script type="text/javascript">

var global_validation=false;
var selected_role="";
$(document).ready(function () {
       form_load();     
       
});
function form_load()
{
    if("{{flag}}"=="1")
    {
        $('#step1').show();
        $('#step4').hide();
    }
    else if("{{flag}}"=="2")
    {
        $('#step4').show();
        $('#step1').hide();
    }

}
function is_Valid(obj)
{
    ele_id=obj.id;
    ele_value=obj.value;
    if (ele_id=="email")
    {
        var flag=validate_email(ele_value);
        if(flag==true)
        {
           document.getElementById(ele_id).classList='input_success';
           global_validation=true;
        }
        else
        {
            document.getElementById(ele_id).classList='input_error';
            global_validation=false;
        }
    }
    else if(ele_id=="username" || ele_id=="password" || ele_id=="cpassword")
    {
        if(ele_value !='')
        {
            document.getElementById(ele_id).classList='input_success';
            global_validation=true;
        }
        else
        {
            document.getElementById(ele_id).classList='input_error';
            global_validation=false;
        }
    }

}
function is_form_valid() {
    var form_valid = false;
    if($('#email').val().trim()==''||$('#username').val().trim()==''||$('#password').val().trim()==''||$('#cpassword').val().trim()=='')
    {
        if($('#email').val().trim() =='')
        {
            document.getElementById('email').classList='input_error';
            global_validation=false;
        }
        if ($('#username').val().trim() =='')
        {
            document.getElementById('username').classList='input_error';
            global_validation=false;
        }
        if ($('#password').val().trim() =='')
        {
            document.getElementById('password').classList='input_error';
            global_validation=false;
        }
        if ($('#cpassword').val().trim() =='')
        {
            document.getElementById('cpassword').classList='input_error';
            global_validation=false;
        }
       
    }
    if($('#password').val().trim()!=$('#cpassword').val().trim())
    {
        document.getElementById('password').classList='input_error';
        document.getElementById('cpassword').classList='input_error';
        global_validation=false;
    }
    
    if(global_validation)
    {
        form_valid=true;   
    }
    
    return form_valid;
}
function form_submit()
{
    if (is_form_valid()==true)
    {
        $('#registration').submit();
    }
}
function form_submit(e)
    {
        $("#overlay").show();
        var form_valid= is_form_valid();
        if(form_valid)
        {
            return true;
        }
        else
        {
            e.preventDefault();
            $("#overlay").hide();
            return false;
        }
    }



</script>
