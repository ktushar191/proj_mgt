{% extends 'userbase.html' %}
{%block stylesheet%}
<style>
 .wm-tweet-us{
  background: azure;
  color: rgb(25, 25, 49);
 }

canvas{
 border-radius: 10px;
 box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
 margin-bottom: 20px;
 /* height: 245px!important;
 width: 550px!important; */
 margin-left: 20px;
 margin-right: 30px;
 padding-right: 20px;
 margin-top: 20px;
 height: 100%;
 width: 30%;
}
.row{
  margin-right: 10px;
}
</style>

{%endblock%}
 
{% block content %}
<form onsubmit="return form_submit(event);" name="registration" id="registration" action="." method="post" enctype="application/x-www-form-urlencoded">
  {% csrf_token %}
  

  <div class="row"> 
    <div class="col-md-3"></div>
    <div class="col-md-6"> 
      <div class="wm-plan-button-typo" style="display: none;">
        <button id="student" type="button" class="wm-tweet-us"  onclick="change_result(this.id);">Student</button>
        <button id="teacher" type="button" class="wm-tweet-us" onclick="change_result(this.id);">Teacher</button>
        <button id="employer" type="button" class="wm-tweet-us" onclick="change_result(this.id);">Employer</button>
        <button id="alumni" type="button" class="wm-tweet-us"  onclick="change_result(this.id);">Alumni</button>
      </div>
    </div>
    <div class="col-md-4">
      <span class="float-end pt-2">
        <button type="button" id='gg' onclick="generatePDF()" class="btn-sm btn-danger pull-right" style="display: none;">Export to PDF</button>
      </span>
    </div>  
  </div>
 
  <div id="result_div">

  </div>
            

</form>


{% endblock%}

{% block javascript %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@2.8.0"></script> 
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@0.7.0"></script>
<script src="/static/login/vendor/jquery/jquery-3.2.1.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.5.3/jspdf.min.js"></script> 
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">

      // Load the Visualization API and the corechart package.
      google.charts.load('current', {'packages':['corechart']});

      // Set a callback to run when the Google Visualization API is loaded.
      google.charts.setOnLoadCallback(LoadChart);

      // Callback that creates and populates a data table,
      // instantiates the pie chart, passes in the data and
      // draws it.
      function drawChart() {

        // Create the data table.
        var data = new google.visualization.DataTable();
        data.addColumn('string', 'Topping');
        data.addColumn('number', 'Slices');
        data.addRows([
          ['Mushrooms', 3],
          ['Onions', 1],
          ['Olives', 1],
          ['Zucchini', 1],
          ['Pepperoni', 2]
        ]);

        // Set chart options
        var options = {'title':'How Much Pizza I Ate Last Night',
                       'width':400,
                       'height':300};

        // Instantiate and draw our chart, passing in some options.
        var chart = new google.visualization.PieChart(document.getElementById('result_div'));
        chart.draw(data, options);
      }
    </script>

  
<script> 


function LoadChart(data)
{
  var row_count=0;
  var column_count=0;
  var result_div = document.getElementById("result_div");
  var ele='';
  
 
  {% for key,value in data.items %}
   row_count=0;
   column_count=0;
   ele = document.createElement("fieldset");
   ele.id='fieldset_'+'{{key}}';
   document.getElementById('result_div').appendChild(ele);
    {%for k,v in value.items%}
      console.log({{k|safe}});
      console.log({{v|safe}});
      var row_div='';
      if (column_count==1 || column_count==0)
      {
        row_count=row_count+1;
        row_div=document.createElement("div");
        row_div.classList+="row";
        row_div.id='{{key}}_row_'+row_count.toString();
        document.getElementById('fieldset_'+'{{key}}').appendChild(row_div);

      
        column_count=0;
      }
      column_count=column_count+1;
      var inner_div=document.createElement("div");
      inner_div.classList+="col-md-5 {{key}}_column_"+column_count.toString();
      inner_div.style="margin-left: 30%;"
      inner_div.id='{{key}}_column_'+column_count.toString();
      document.getElementById('{{key}}_row_'+row_count.toString()).appendChild(inner_div);

     var canva_ele='';
     canva_ele=document.createElement('canvas');
     canva_ele.id='{{key}}_canvas_{{k}}';
      
     
      document.getElementById('{{key}}_row_'+row_count.toString()).getElementsByClassName('{{key}}_column_'+column_count.toString())[0].appendChild(canva_ele);
      drawPieGraph({{v|safe}}, '{{key}}_canvas_{{k}}'); 
      
     
     
    {%endfor%}

  {%endfor%}
}

$(document).ready(function () {
  var data="{{data | safe }}";
 LoadChart(data);
 //drawChart()
  $('#fieldset_student').show();
  $('#fieldset_teacher').hide();
  $('#fieldset_employer').hide();
  $('#fieldset_alumni').hide();
  document.getElementById('page_heading').innerText='Feedback Analysis - Student';
 
});

function change_result(id)
{
  if(id=='student')
  {
    $('#fieldset_student').show();
    $('#fieldset_teacher').hide();
    $('#fieldset_employer').hide();
    $('#fieldset_alumni').hide();
    document.getElementById('page_heading').innerText='Feedback Analysis - Student';
   
  }
  else if(id=='teacher')
  {
    $('#fieldset_student').hide();
    $('#fieldset_teacher').show();
    $('#fieldset_employer').hide();
    $('#fieldset_alumni').hide();
    document.getElementById('page_heading').innerText='Feedback Analysis - Teacher';
    
  }
  else if(id=='employer')
  {
    $('#fieldset_student').hide();
    $('#fieldset_teacher').hide();
    $('#fieldset_employer').show();
    $('#fieldset_alumni').hide();
    document.getElementById('page_heading').innerText='Feedback Analysis - Employer';
  
  }
  else if(id=='alumni')
  { 
    $('#fieldset_student').hide();
    $('#fieldset_teacher').hide();
    $('#fieldset_employer').hide();
    $('#fieldset_alumni').show();
    document.getElementById('page_heading').innerText='Feedback Analysis - Alumni';
  }
}

function drawPieGraph(data, id) { 

  var labels = data.labels; 
  var chartLabel = data.chartLabel; 
  var chartdata = data.chartdata; 
  var ctx = document.getElementById(id).getContext('2d'); 
  var chart = new Chart(ctx, { 
    // The type of chart we want to create 
    type: 'pie', 
    
    // The data for our dataset 
    data: { 
      labels: labels, 
      datasets: [{ 
        label: chartLabel,
        data: chartdata, 
        borderWidth: 1,
        
        backgroundColor: [ 
          
          'rgba(26, 82, 118)', 
          'rgba(60, 179, 113)',
          'rgba(54, 162, 235)', 
          'rgba(255, 165, 0)',
          'rgba(255, 35, 35)',
          
        ], 
        borderColor: [ 
         
           'rgba(0, 0, 255,0.2)', 
          'rgba(60, 179, 113,0.2)',
          'rgba(54, 162, 235,0.2)', 
          'rgba(255, 165, 0,0.2)',
          'rgba(255, 35, 35,0.2)',
          
        ], 
        
      }],
     
    }, 

    // Configuration options go here 
   
    options: { 
      
      scales: { 
        xAxes: [{ 
          display: false 
        }], 
        yAxes: [{ 
          display:false,
          gridLines: {
            display:false
          }         
        }] ,
        
      },
      title: {
          display: true,
          text: chartLabel, 
    } ,
    tooltips: {
        enabled: true
    },
    plugins: {
      datalabels: {
        display: true, // Show data labels
        color: '#000', // Customize label color
        font: {
          weight: 'bold', // Set font weight
          size: 16 // Set font size
        }
      },
    },
    legend: {
      display:true,
      position: 'bottom',
      font: {
          weight: 'bold',
          size: 16
        }
    },
    } 

  }); 
} 

function drawBarGraph(data, id) { 
    var labels = data.labels; 
    var chartLabel = data.chartLabel; 
    var chartdata = data.chartdata; 
    var ctx = document.getElementById(id).getContext('2d'); 
    var myChart = new Chart(ctx, { 
      type: 'bar', 
      data: { 
        labels: labels, 
        datasets: [{ 
          label: chartLabel, 
          data: chartdata, 
          backgroundColor: [ 
            'rgba(255, 99, 132, 0.2)', 
            'rgba(54, 162, 235, 0.2)', 
            'rgba(255, 206, 86, 0.2)', 
            'rgba(75, 192, 192, 0.2)', 
            'rgba(153, 102, 255, 0.2)', 
            'rgba(255, 159, 64, 0.2)' 
          ], 
          borderColor: [ 
            'rgba(255, 99, 132, 1)', 
            'rgba(54, 162, 235, 1)', 
            'rgba(255, 206, 86, 1)', 
            'rgba(75, 192, 192, 1)', 
            'rgba(153, 102, 255, 1)', 
            'rgba(255, 159, 64, 1)' 
          ], 
          borderWidth: 1 
        }] 
      }, 
      options: { 
        scales: { 
          yAxes: [{ 
            ticks: { 
              beginAtZero: true 
            } 
          }] 
        } 
      } 
    }); 
  } 
</script> 

<script>
      function generatePDF() {
            
            // Choose the element id which you want to export.
            var element = document.getElementById('result_div');
            element.style.width = '700px';
            element.style.height = '900px';
            var opt = {
                margin:       0.5,
                filename:     'myfile.pdf',
                image:        { type: 'jpeg', quality: 1 },
                html2canvas:  { scale: 1 },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait',precision: '12' }
              };
            
            // choose the element and pass it to html2pdf() function and call the save() on it to save as pdf.
            html2pdf().set(opt).from(element).save();
          }

var csrftoken = jQuery("[name=csrfmiddlewaretoken]").val();
function csrfSafeMethod(method) {
// these HTTP methods do not require CSRF protection
return (/^(GET|HEAD|OPTIONS|TRACE)$/.test(method));
}

$.ajaxSetup({
    beforeSend: function (xhr, settings) {
        // if not safe, set csrftoken
        if (!csrfSafeMethod(settings.type) && !this.crossDomain) {
            xhr.setRequestHeader("X-CSRFToken", csrftoken);
        }
    }
});
</script>
{% endblock %}
