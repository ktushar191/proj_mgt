{% block content %}
<form onsubmit="return form_submit(event);" id="addmcqquestions" name="addmcqquestions" action="." method="post" enctype="multipart/form-data">
{% csrf_token %}
<input type="hidden" id="action" name="action" value="" />
<input type="hidden" id="data_file" name="data_file" value="" />

    <div class="row">
    <div class="col-md-2"></div>
    <div class="col-md-8">
        <div style="width:100%;height:100%;border-radius: 10px;box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);">
        
            <div class="row" style="float:left; width: 100%;">
                <div class="col-md-12 details-name" style="margin-left: 15px;">
                    <h3 style="color:#ffffff;font-size: xxx-large;text-align:center;">Add MCQ Questions</h3>
                </div>
            </div>
            <div class="row" style="float:left; width: 100%;margin-bottom:20px;margin-top:20px;">
                <fieldset legend="AAA" style="margin-left: 100px;margin-bottom: 20px;padding-bottom: 20px; width:90%;height:100%;border-radius: 10px;box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);">
                    <div class="col-md-4" style="margin-top:20px;margin-left:100px;">
                        <label>Select Course</label>
                        <select id="course" name="course" class="custom-select" style="width:100%;display:flex;font-size:14px;" onchange="fill_subjects();course_changed();">
                            <option  value="">Select Course</option>
                            {% for item in course_details %}
                                <option value="{{item.id}}">{{item.course_name}}</option>
                            {%endfor%}   
                        </select>
                        <span id="course_err" name="course_err" style="color: red;">* Select Course</span>
                        
                    </div>
                    

                    <div class="col-md-4" style="margin-top:20px;margin-left:100px;">
                        <label>Select Pattern</label>
                        <select id="pattern" name="pattern" class="custom-select" style="width:100%;display:flex;font-size:14px" onchange="fill_subjects();pattern_changed();">
                            <option  value="">Select Pattern</option>
                                <option value="2024">2024</option>
                                <option value="2020">2020</option>
                                <option value="2019">2019</option>
                        </select>
                        <span id="pattern_err" name="pattern_err" style="color: red;">* Select Pattern</span>
                    </div>
                
                    <div class="col-md-4" style="margin-top:20px;margin-left:100px;">
                        <label>Select Semester</label>
                        <select id="sem" name="sem" class="custom-select" style="width:100%;display:flex;font-size:14px" onchange="fill_subjects();semester_changed();">
                            <option  value="">Select Semester</option>
                            {% for item in semester_details %}
                                <option value="{{item.id}}">{{item.semester_name}}</option>
                            {%endfor%}
                            
                        </select>
                        <span id="sem_err" name="sem_err" style="color: red;">* Select Semester</span>
                    </div>

                    <div class="col-md-4" style="margin-top:20px;margin-left:100px;">
                        <label>Select Subject</label>
                        <select id="subject" name="subject" class="custom-select" style="width:100%;display:flex;font-size:14px" onchange="subject_changed()">
                        </select>
                        <span id="subject_err" name="subject_err" style="color: red;">* Select Subject</span>
                    </div>
                    <div class="col-md-4" style="margin-top:20px;margin-left:100px;display:none;">
                        <label>Select Academic Year</label>
                        <select id="ayear" name="ayear" class="custom-select" style="width:100%;display:flex;font-size:14px">
                            <option  value="">Select Academic year</option>
                            {% for item in ayear_data %}
                                <option value="{{item.id}}">{{item.ayear}}</option>
                            {%endfor%}
                        </select>
                    </div>
                    <div class="col-md-4" style="margin-top:20px;margin-left:100px">
                        <label>Select Chapter</label>
                        <select id="chapter" name="chapter" class="custom-select" style="width:100%;display:flex;font-size:14px">
                            <option  value="0">Select Chapter</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="13">13</option>
                                <option value="14">14</option>
                                <option value="15">15</option>

                        </select>
                    </div>
                </fieldset>
                <div class="row" style="float:left; width: 100%;margin-bottom:20px;margin-top:20px;">
                    <h3 class="col-md-12" style="margin-left: 50%;">Enter Question</h3>
                 </div>
                <div style="margin-left: 100px;margin-bottom: 20px;padding-bottom: 20px;width:90%;height:100%;border-radius: 10px;box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);">
                    <div class="col-md-12" style="margin-top:20px;margin-left:100px">
                    <input type="text" id="question" name="question" placeholder="Enter Question here" style="width: 75%;">
                    </div>
                    <div class="col-md-12" style="margin-top:20px;margin-left:100px">
                        <input type="text" id="option1" name="option1" placeholder="Option 1" style="width: 75%;">
                    </div>
                    <div class="col-md-12" style="margin-top:20px;margin-left:100px">
                        <input type="text" id="option2" name="option2" placeholder="Option 2" style="width: 75%;">
                    </div>
                    <div class="col-md-12" style="margin-top:20px;margin-left:100px">
                        <input type="text" id="option3" name="option3" placeholder="Option 3" style="width: 75%;">
                    </div>
                    <div class="col-md-12" style="margin-top:20px;margin-left:100px">
                        <input type="text" id="option4" name="option4" placeholder="Option 4" style="width: 75%;">
                    </div>
                    <div class="col-md-4" style="margin-top:20px;margin-left:100px">
                        <label>Correct Answer</label>
                        <select id="answer" name="answer" class="custom-select" style="width:100%;display:flex;font-size:14px">
                            <option  value="">Select answer</option>
                                <option value="1">Option 1</option>
                                <option value="2">Option 2</option>
                                <option value="3">Option 3</option>
                                <option value="4">Option 4</option>
                        </select>
                    </div>
                    <div class="col-md-4" style="margin-top:40px;margin-left:140px"> 
                    <!-- <div class="wm-plan-button-typo"> -->
                        <button id="btn_add" name="btn_add" style="width: 200px;height:50px;font-size:20px;padding: 0;" type="button" class="wm-tweet-us"  onclick="add_mcqquestions(this.id);">Add</button>
                    <!-- </div> -->
                    </div>
                </div>
                <div class="row" style="float:left; width: 100%;margin-bottom:20px;margin-top:20px;">
                   <h3 class="col-md-12" style="margin-left: 50%;">OR Upload Excel</h3>
                </div>
                 <div style="margin-left: 100px;;width:90%;height:70px;padding-top:20px;padding-left:20px; border-radius: 10px;box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);">
                    <input type="file" name="file_input" id="file_input" accept="xls/*" style="float: left;size:20px;"> 
                    <a href="/static/mcqexam/sample_mcq_question_file.xlsx" target="_blank">Download sample excel file</a> 
                    <button id="btn_upload" name="btn_upload" style="width: 200px;height:50px;font-size:20px;padding: 0;float:right;margin-top: -10px;" type="button" class="wm-tweet-us"  onclick="add_mcqquestions(this.id);">Upload</button>
                    
                </div>
                

                <div>
                    
                </div>
           
            </div>
           
        </div>
    </div>
    <div class="col-md-2"></div>

    </div>
</form>
{% endblock%}

{%block javascript%}
<script type="text/javascript" src="/static/script/jquery.js"></script>
<script type="text/javascript">

var csrftoken = jQuery("[name=csrfmiddlewaretoken]").val();

function csrfSafeMethod(method) {
// these HTTP methods do not require CSRF protection
return (/^(GET|HEAD|OPTIONS|TRACE)$/.test(method));
}

$.ajaxSetup({
    beforeSend: function (xhr, settings) {
        // if not safe, set csrftoken
        if (!csrfSafeMethod(settings.type) && !this.crossDomain) {
            xhr.setRequestHeader("X-CSRFToken", csrftoken);
        }
    }
});



var form_valid=false;
function form_submit(e)
{
    $("#overlay").show();
    
    var form_valid= is_form_valid(e);
    if(form_valid)
    {
        return true;
    }
    else
    {
        $("#overlay").hide();
        e.preventDefault();
        return false;
    }
}
function is_form_valid(e)
{   
    form_valid=true;
    course_id=$('#course').val();
    pattern_id=$('#pattern').val();
    sem_id=$('#sem').val();
    subject_id=$('#subject').val();
    if(course_id == '' || course_id=='None' || course_id==null)
    {
        form_valid=false;
        $('#course_err').show();

    }
    else{
        $('#course_err').hide();
    }
    if(pattern_id == '' || pattern_id=='None' || pattern_id==null)
    {
        form_valid=false;
        $('#pattern_err').show();
    }
    else{
        $('#pattern_err').hide();
    }
    if(sem_id == '' || sem_id=='None' || sem_id==null)
    {
        form_valid=false;
        $('#sem_err').show();
    }
    else{
        $('#sem_err').hide();
    }
    if(subject_id == '' || subject_id=='None' || subject_id==null)
    {
        form_valid=false;
        $('#subject_err').show();
    }
    else{
        $('#subject_err').hide();
    }
   
    return form_valid;
}
function add_mcqquestions(id)
{
    if(id=='btn_add')
    {
        $('#action').val('add');
    }
    else if(id=='btn_upload')
    {
        $('#action').val('upload');
    }
    $('#addmcqquestions').submit();
}
$(document).ready(function () {

    document.getElementById('page_heading').innerText='MCQ Add Questions';
    $('#course_err').hide();
    $('#pattern_err').hide();
    $('#sem_err').hide();
    $('#subject_err').hide();

    });


function fill_subjects()
{
$.ajax({
        
        url: "/mcqexams/get_all_subjects_by_course_and_sem/",
        method: 'POST',
        data :{ 
            'course_id': $('#course').val(),
            'pattern': $('#pattern').val(),
            'sem_id': $('#sem').val(),
            },
        dataType: 'json',
        
        success : function(response,status) {
            
            if(response.success)
            {
            $('#subject').html('<option value="">Select Subject</option>')
            var html = $.map(response.data, function(res){
                        return '<option value="' + res.id + '">' + res.subject_name + '</option>';
            }).join('');
            $('#subject').html(html);
            }
            else
            {
                $('#subject').html('<option value="">Select Subject</option>')
            }
            
        },
        error: function (response) {
            console.log('Something went wrong, please refresh the page.');
        }
    })
}
function reset_subject()
{
    $('#subject').val('');
}
function reset_semester()
{
    $('#sem').val('');
}
function reset_pattern()
{
    $('#pattern').val('');
}
function reset_chapter()
{
    $('#chapter').val('0');
}
function course_changed()
{
    var course_id=$('#course').val();
   
    reset_pattern();
    reset_semester();
    reset_subject();
    reset_chapter();
    if(course_id == '' || course_id=='None' || course_id==null)
    {
        
        $('#course_err').show();

    }
    else{
        $('#course_err').hide();
    }
}
function pattern_changed()
{
    var pattern_id=$('#pattern').val();
    
    reset_semester();
    reset_subject();
    reset_chapter();
    if(pattern_id == '' || pattern_id=='None' || pattern_id==null)
    {
        $('#pattern_err').show();
    }
    else{
        $('#pattern_err').hide();
    }
}
function semester_changed()
{
    sem_id=$('#sem').val();
    
    reset_subject();
    reset_chapter();
    if(sem_id == '' || sem_id=='None' || sem_id==null)
    {
        $('#sem_err').show();
    }
    else{
        $('#sem_err').hide();
    }
}
function subject_changed()
{
    var subject_id=$('#subject').val();
    reset_chapter();
    if(subject_id == '' || subject_id=='None' || subject_id==null)
    {
        $('#subject_err').show();
    }
    else{
        $('#subject_err').hide();
    }
}


    

</script>

{%endblock%}
