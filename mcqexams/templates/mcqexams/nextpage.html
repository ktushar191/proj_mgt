<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Exam Software</title>
    <style>
        .maincontainer{
            max-width: 700px;
            margin: 60px auto;
            border: #100f10 5px solid;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .header img {
            width: 70px;
            height: 70px;
            margin-right: 15px;
        }

        .question-container {
            border: 1px solid #242324;
            padding: 10px;
            margin-bottom: 10px;
        }

        h1 {
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"], input[type="number"] {
            width: calc(100% - 30px);
            padding: 8px;
            margin-bottom: 10px;
        }

        .options input[type="radio"] {
            display: inline-block;
            vertical-align: middle;
            margin-right: 5px;
        }

        .options label {
            display: inline-block;
            vertical-align: middle;
            margin-bottom: 10px;
        }

        .correct-answer {
            margin-top: 10px;
        }

        .buttons {
            margin-top: 20px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            cursor: pointer;
            margin-right: 10px;
        }

        button:hover {
            background-color: #a32189;
        }
    </style>
</head>
<body>
    <div class="header">
        <!-- <img src="\static\images\mcq\logo.png" alt="Logo"> -->
        <h1>MCQ Exam Software</h1>
    </div>
    <hr>
    <div class="maincontainer">
        <div class="container">
            <label for="questionCount"><h2><b>Enter The Number Of Questions:</b></h2></label>
            <input type="number" id="questionCount" min="1" value="1">
            <button type="button" onclick="generateQuestionContainers()">Generate Questions</button><br><br>
            <div id="questionsContainer"></div>
            <div class="buttons">
                <button type="button" onclick="saveData()">Save</button>
            </div>
        </div>
    </div>
    <script>
        function generateQuestionContainers() {
            var questionCount = parseInt(document.getElementById('questionCount').value);
            var questionsContainer = document.getElementById('questionsContainer');
            questionsContainer.innerHTML = '';

            for (var i = 1; i <= questionCount; i++) {
                var questionContainer = document.createElement('div');
                questionContainer.classList.add('question-container');
                questionContainer.innerHTML = `
                    <label for="question${i}">Question ${i}:</label>
                    <input type="text" id="question${i}" required>
                    <div class="options">
                        <input type="radio" id="option${i}A" name="option${i}" value="A">
                        <label for="option${i}A">A:</label>
                        <input type="text" id="option${i}1" required>
                    </div>
                    <div class="options">
                        <input type="radio" id="option${i}B" name="option${i}" value="B">
                        <label for="option${i}B">B:</label>
                        <input type="text" id="option${i}2" required>
                    </div>
                    <div class="options">
                        <input type="radio" id="option${i}C" name="option${i}" value="C">
                        <label for="option${i}C">C:</label>
                        <input type="text" id="option${i}3" required>
                    </div>
                    <div class="options">
                        <input type="radio" id="option${i}D" name="option${i}" value="D">
                        <label for="option${i}D">D:</label>
                        <input type="text" id="option${i}4" required>
                    </div>
                    <div class="correct-answer">
                        <label for="correctOption${i}">Correct Option:</label>
                        <input type="text" id="correctOption${i}" required>
                    </div>
                `;
                questionsContainer.appendChild(questionContainer);
            }
        }

        function saveData() {
            var questions = document.querySelectorAll('.question-container');
            questions.forEach(function(question, index) {
                var questionText = question.querySelector('#question${index+1}').value;
                var option1 = question.querySelector('#option${index+1}1').value;
                var option2 = question.querySelector('#option${index+1}2').value;
                var option3 = question.querySelector('#option${index+1}3').value;
                var option4 = question.querySelector('#option${index+1}4').value;
                var correctOption = question.querySelector('#correctOption${index+1}').value;
                console.log("Question " + (index + 1) + ": " + questionText);
                console.log("Option 1: " + option1);
                console.log("Option 2: " + option2);
                console.log("Option 3: " + option3);
                console.log("Option 4: " + option4);
                console.log("Correct Option: " + correctOption);
            });
        }
    </script>
</body>
</html>
