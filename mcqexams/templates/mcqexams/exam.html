<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Page Design</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;

    align-self: center;
    background-color: white;
}
#container{
    background-color: white;
    /* max-width: 400px; */
    margin: 50px auto;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    height: 600px;
    width: 50%;
    align-self: center;
    border-style: solid;
  }
header {
  background-color: rgb(27, 27, 240);
  padding: 1rem;
  text-align: center;
}

h1 {
  color: white;
  font-size: 2rem;
}

section {
  margin: 1rem;
}

h2 {
  color: black;
  font-size: 1.5rem;
  margin-bottom: 1rem;
  text-align: center;
}
p{
    text-align: center;
}
button {
  background-color: #4445;
  border: none;
  color: #fff;
  padding: 0.5rem 1rem;
  cursor: pointer;
}

#timer-text {
  font-size: 2rem;
  font-weight: bold;
}

#progress {
  background-color: #4445;
  height: 20px;
  width: 0;
}

footer {
  background-color: #4445;
  padding: 1rem;
  text-align: center;
  color: #fff;
}
</style>
</head>
<body>
    <div id="container">
  <header>
    <h1>PYTHON MCQ CLASS TEST</h1>
  </header>
  <main>
   
    <section id="assessment-details">
      <h2>Assessment Details</h2>
      <p>Start Assessment: <button id="startassessment">Start</button></p>
      <p>Duration: 60 Mins</p>
      
      <p>Number of Questions: <span id="questions"></span></p>
      <p>Total Attempts: 99</p>
      <p>Cut-Off: 60%</p>
      <p>Passing Score: 100%</p>
    </section>
    <section id="timer">
      <h2>Timer</h2>
      <p id="timer-text">00:00:00</p>
    </section>
    
  </main>
</div>
  <script src="script.js"></script>
</body>
</html>
