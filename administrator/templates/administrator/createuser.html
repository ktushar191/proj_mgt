{%block javascript%}
<script type="text/javascript" src="/static/script/jquery.js"></script>
<script type="text/javascript">

var form_valid=false;
function form_submit(e)
{
    $("#overlay").show();
    
    var form_valid= is_form_valid(e);
    if(form_valid)
    {
        return true;
    }
    else
    {
        $("#overlay").hide();
        e.preventDefault();
        return false;
    }
}
function is_form_valid(e)
{   
    form_valid=true;
   
    return form_valid;
}

$(document).ready(function () {

    document.getElementById('page_heading').innerText='Create User';
   
    });

function adduser(id)
{
    $('#action').val('upload');
    $('#createuser').submit();
}

</script>
